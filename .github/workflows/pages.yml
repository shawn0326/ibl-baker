name: pages

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/pages.yml"
      - "package.json"
      - "package-lock.json"
      - "packages/ibla-loader/**"
      - "packages/ktx2-loader/**"
      - "packages/ibla-viewer/**"
      - "packages/ktx2-viewer/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run build -w @ibltools/ibla-viewer

      - run: npm run build -w @ibltools/ktx2-viewer

      - run: |
          mkdir -p _site/ibla-viewer _site/ktx2-viewer
          cp -R packages/ibla-viewer/dist/. _site/ibla-viewer/
          cp -R packages/ktx2-viewer/dist/. _site/ktx2-viewer/
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
