name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    env:
      RELEASE_VERSION: ${{ github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive_suffix: windows-x64.zip
            binary_name: ibl-baker.exe
          - label: macos-arm64
            runner: macos-14
            target: aarch64-apple-darwin
            archive_suffix: macos-arm64.tar.gz
            binary_name: ibl-baker
          - label: linux-x64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_suffix: linux-x64.tar.gz
            binary_name: ibl-baker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Run workspace tests
        run: cargo test --workspace

      - name: Build release binary
        run: cargo build --release -p ibl_cli --target ${{ matrix.target }}

      - name: Set archive name
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_ENV -Value "ARCHIVE_NAME=ibl-baker-$env:RELEASE_VERSION-${{ matrix.archive_suffix }}"

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "release/${{ matrix.binary_name }}"
          Compress-Archive -Path "release/${{ matrix.binary_name }}" -DestinationPath "$env:ARCHIVE_NAME" -Force

      - name: Package Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p release
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "release/${{ matrix.binary_name }}"
          tar -czf "$ARCHIVE_NAME" -C release "${{ matrix.binary_name }}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: ${{ env.ARCHIVE_NAME }}

  release:
    name: publish-release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
          body: |
            Prebuilt `ibl-baker` binaries are attached for:

            - Windows x64
            - macOS arm64
            - Linux x64

            Registry publishing remains manual:

            - Cargo: `ibl_core`, `ibl_cli`
            - npm: `@ibltools/loader`
