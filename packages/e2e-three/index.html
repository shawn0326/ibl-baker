<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IBLA Three Manual Check</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #ebe5da;
        --panel: rgba(255, 251, 245, 0.92);
        --text: #1f1b16;
        --muted: #6d6458;
        --line: rgba(82, 65, 42, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", "Helvetica Neue", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(224, 189, 132, 0.18), transparent 28%),
          linear-gradient(180deg, #f8f3eb 0%, var(--bg) 100%);
      }

      main {
        width: min(1100px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 28px 0 42px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 24px;
        box-shadow: 0 18px 48px rgba(42, 31, 18, 0.1);
      }

      h1,
      p,
      pre {
        margin: 0;
      }

      .subtitle {
        margin-top: 10px;
        color: var(--muted);
        line-height: 1.6;
      }

      #viewport {
        margin-top: 20px;
        width: 960px;
        max-width: 100%;
        aspect-ratio: 4 / 3;
        border-radius: 18px;
        overflow: hidden;
        border: 1px solid var(--line);
        background: #111;
      }

      #status {
        margin-top: 18px;
        padding: 14px 16px;
        border-radius: 16px;
        background: rgba(93, 76, 58, 0.08);
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <h1>Three Integration Check</h1>
        <p class="subtitle">
          Manual browser validation for committed `.ibla` fixtures through
          <code>@ibltools/three-loader</code>.
        </p>
        <div id="viewport"></div>
        <pre id="status">Booting scene...</pre>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
